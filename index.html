<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Lista de Exercícios - Algoritmos</title>
  <style>
    body { font-family: Arial; background:#0f172a; color:#fff; text-align:center; }
    h1 { margin-top:20px; }
    .container { display:grid; grid-template-columns: repeat(auto-fit, minmax(250px,1fr)); gap:15px; padding:20px; }
    .card { background:#1e293b; padding:15px; border-radius:12px; }
    button { padding:10px; border:none; border-radius:8px; cursor:pointer; }
  </style>
</head>
<body>

<h1>Lista de Exercícios - Estrutura Sequencial</h1>

<div class="container">

<div class="card"><button onclick="ex1()">1. Soma</button></div>
<div class="card"><button onclick="ex2()">2. Antecessor/Sucessor</button></div>
<div class="card"><button onclick="ex3()">3. Média</button></div>
<div class="card"><button onclick="ex4()">4. Conversor</button></div>
<div class="card"><button onclick="ex5()">5. Área</button></div>
<div class="card"><button onclick="ex6()">6. Temperatura</button></div>
<div class="card"><button onclick="ex7()">7. Desconto</button></div>
<div class="card"><button onclick="ex8()">8. Restaurante</button></div>
<div class="card"><button onclick="ex9()">9. Dias de Vida</button></div>
<div class="card"><button onclick="ex10()">10. Salário</button></div>

</div>

<script>
function ex1(){
 let n1 = Number(prompt("Digite o primeiro número:"));
 let n2 = Number(prompt("Digite o segundo número:"));
 alert("Soma: " + (n1+n2));
}

function ex2(){
 let n = Number(prompt("Digite um número:"));
 alert(`Antecessor: ${n-1} | Sucessor: ${n+1}`);
}

function ex3(){
 let nome = prompt("Nome:");
 let n1 = Number(prompt("Nota 1:"));
 let n2 = Number(prompt("Nota 2:"));
 let n3 = Number(prompt("Nota 3:"));
 let m = (n1+n2+n3)/3;
 alert(`${nome}, média: ${m.toFixed(2)}`);
}

function ex4(){
 let r = Number(prompt("Reais:"));
 alert("Dólares: " + (r/5).toFixed(2));
}

function ex5(){
 let l = Number(prompt("Largura:"));
 let c = Number(prompt("Comprimento:"));
 alert("Área: " + (l*c) + " m²");
}

function ex6(){
 let c = Number(prompt("Celsius:"));
 alert("Fahrenheit: " + ((c*9/5)+32));
}

function ex7(){
 let p = Number(prompt("Preço:"));
 let d = p*0.15;
 alert(`Final: ${p-d} (Desconto: ${d})`);
}

function ex8(){
 let v = Number(prompt("Conta:"));
 let g = v*0.10;
 alert(`Total: ${v+g} (Gorjeta: ${g})`);
}

function ex9(){
 let i = Number(prompt("Idade:"));
 alert("Dias vividos: " + (i*365));
}

function ex10(){
 let h = Number(prompt("Horas:"));
 let vh = Number(prompt("Valor hora:"));
 let b = h*vh;
 let l = b - (b*0.08);
 alert(`Bruto: ${b} | Líquido: ${l}`);
}
</script>

</body>
</html>
